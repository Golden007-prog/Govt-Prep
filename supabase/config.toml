# Supabase config for GovPrep. Used by the Supabase CLI for local dev and as a reference
# for the hosted project (provisioned via the Supabase MCP). Secrets come from env — never inline.
project_id = "govprep"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Set to the deployed GitHub Pages URL in production, e.g. https://<user>.github.io/GovPrep/
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

# GitHub OAuth (the chosen auth provider). Secrets are read from env, not committed.
[auth.external.github]
enabled = true
client_id = "env(GITHUB_CLIENT_ID)"
secret = "env(GITHUB_SECRET)"

[edge_runtime]
enabled = true
