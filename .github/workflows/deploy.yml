# Build the Vite SPA and deploy it to GitHub Pages (https://golden007-prog.github.io/Govt-Prep/).
# Supabase URL + publishable key come from repo Actions *variables* (Settings → Secrets and
# variables → Actions → Variables) — never from committed files. The anon/publishable key is
# safe in the client bundle by design (RLS protects data); real secrets never enter this build.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      # npm install (not ci): the lockfile is generated on Windows and omits nested deps of
      # Linux-only napi/rolldown optional packages (@emnapi/*), which makes npm ci reject it.
      # install still honors every version pinned in the lockfile.
      - name: Install dependencies
        working-directory: Frontend
        run: npm install --no-audit --no-fund

      - name: Build (tsc -b && vite build)
        working-directory: Frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
